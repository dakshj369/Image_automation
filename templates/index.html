<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Automation Pipeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16305a;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: gray;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #1e3c72;
            font-weight: bold;
        }
    </style>

    <script>
        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }
    </script>

</head>
<body>

<div class="card">
    <h2>Image Processing Pipeline</h2>

    <form method="POST" onsubmit="showLoader()">
        <label>Search Keyword</label>
        <input type="text" name="keyword" placeholder="e.g. mountains" required>

        <label>Number of Images</label>
        <input type="number" name="num_images" min="1" max="50" placeholder="e.g. 10" required>

        <label>Receiver Email</label>
        <input type="email" name="email" placeholder="example@email.com" required>

        <button type="submit">Start Processing</button>
    </form>

    <div id="loader" class="loader">
        Processing... Please wait ⏳
    </div>

    <div class="footer">
        Developed using Flask + SendGrid
    </div>
</div>

</body>
</html>
